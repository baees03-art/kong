<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 노래 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switch-wrapper">
            <button id="theme-toggle">모드 전환</button>
        </div>
        <h1>랜덤 노래 생성기</h1>
        <div class="buttons">
            <button id="kpop">한국 가요</button>
            <button id="kballad">한국 발라드</button>
            <button id="pop">팝</button>
        </div>
        <div id="player"></div>
        <p id="song-title"></p>

        <hr class="divider">

        <section class="contact-section">
            <h3>제휴 및 문의</h3>
            <form action="https://formspree.io/f/your-id-here" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
