<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 노래 생성기</title>
    <link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8343223063801879"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="theme-switch-wrapper">
            <button id="theme-toggle">모드 전환</button>
        </div>
        <h1>랜덤 노래 생성기</h1>
        <div class="buttons">
            <button id="kpop">한국 가요</button>
            <button id="kballad">한국 발라드</button>
            <button id="pop">팝</button>
        </div>
        <div id="player"></div>
        <p id="song-title"></p>

        <hr class="divider">

        <section class="animal-test-section">
            <h2>🐶 강아지상 vs 고양이상 테스트 🐱</h2>
            <p class="subtitle">AI가 당신의 동물상을 분석해드립니다!</p>
            <div class="upload-container" id="upload-container">
                <input type="file" id="image-upload" accept="image/*" hidden>
                <label for="image-upload" class="upload-label">
                    <div id="upload-preview">
                        <span class="upload-icon">📸</span>
                        <p>사진을 클릭하여 업로드하세요</p>
                    </div>
                </label>
            </div>
            <div id="loading" class="hidden">AI 분석 중...</div>
            <div id="result-container" class="hidden">
                <div id="result-message"></div>
                <div class="progress-bar-container">
                    <div id="dog-bar" class="progress-bar dog"></div>
                    <div id="cat-bar" class="progress-bar cat"></div>
                </div>
                <div class="labels">
                    <span>강아지상: <span id="dog-percent">0</span>%</span>
                    <span>고양이상: <span id="cat-percent">0</span>%</span>
                </div>
                <button onclick="resetTest()" class="reset-btn">다시 하기</button>
            </div>
        </section>

        <hr class="divider">

        <section class="contact-section">
            <h3>제휴 및 문의</h3>
            <form action="https://formspree.io/f/mzdjerzr" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함/업체명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://kong11.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
